aid: height
name: Height
description: >
  Height is an AI-powered collaborative project management tool that provides a
  REST API for managing tasks, lists, workspaces, attributes, dependencies, and
  automation triggers. The API enables developers to programmatically create,
  read, update, and delete tasks and task lists, manage workspace users and
  groups, post activity comments, and configure webhook integrations for
  real-time event notifications. Authentication is handled via secret API keys
  generated from workspace settings, with OAuth 2.0 available for third-party
  application integrations. Height announced the shutdown of its service with a
  final date of September 24, 2025, making this a historical profile of the
  platform's public developer footprint.
