    name: Height REST API
    description: >
      The Height REST API provides programmatic access to workspace tasks, lists,
      users, activities, field templates, webhooks, and automation triggers.
      Resources are identified by UUID v4 identifiers and all timestamps follow
      ISO 8601 format. Real-time propagation ensures API changes are immediately
      reflected across all workspace members.
